<!-- Custom styles layered on top of the minimal theme -->
<style>
  /* Headshot in the sidebar */
  header img {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 50%;
    display: block;
    margin: 10px 0 15px 0;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
  }
  .site-nav ul {
    list-style: none;
    padding: 0;
    margin: 20px 0;
  }
  .site-nav li {
    margin: 0 0 6px 0;
  }
  .site-nav a {
    display: block;
    padding: 4px 10px;
    border-left: 3px solid transparent;
    text-decoration: none;
    color: #267CB9;
  }
  .site-nav a:hover {
    border-left-color: #069;
    background: rgba(0, 0, 0, 0.03);
  }
  .site-nav li.active a {
    border-left-color: #267CB9;
    font-weight: bold;
    color: #069;
  }
  /* Slightly roomier line height for long research prose */
  section p {
    line-height: 1.6;
  }

  /* Figures in body content */
  figure {
    margin: 18px 0 24px 0;
  }
  /* Full-width figures and section headings clear any floated photos */
  section h3,
  figure:not(.photo) {
    clear: both;
  }
  figure img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 4px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
  }
  figure figcaption {
    font-size: 13px;
    line-height: 1.45;
    color: #555;
    margin-top: 6px;
    font-style: italic;
  }
  /* Smaller, right-floated field/personal photos on wider screens */
  figure.photo {
    max-width: 320px;
  }
  @media (min-width: 720px) {
    figure.photo {
      float: right;
      margin: 4px 0 12px 24px;
    }
  }
</style>
